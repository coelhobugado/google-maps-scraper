name: Release
permissions:
  contents: write
on:
  release:
    types: [published]
jobs:
  artifacts:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5
        with:
          go-version: 1.26.4
          cache: true
      - name: Validate tag and gate
        run: |
          test "${GITHUB_REF_NAME#v}" = "2.2.0"
          make gate
      - name: Build signed manifest inputs
        run: |
          make package
          ./scripts/inventory.sh > dist/INVENTORY.txt
      - name: Upload immutable artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
