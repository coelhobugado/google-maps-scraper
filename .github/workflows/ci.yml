name: CI
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5
        with:
          go-version: 1.26.4
          cache: true
      - name: Quality gate
        run: make gate
      - name: Targeted race tests
        run: make test-race
  docker:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: gate
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build container
        run: docker build --pull --tag google-maps-scraper:test .
      - name: Smoke container
        run: |
          docker run -d --name gmaps -p 127.0.0.1:18080:8080 google-maps-scraper:test
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:18080/healthz && exit 0; sleep 2; done
          docker logs gmaps
          exit 1
